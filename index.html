<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>งบรายเดือน</title>
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; font-family: 'IBM Plex Sans Thai', sans-serif; -webkit-tap-highlight-color: transparent; }
  .num { font-family: 'IBM Plex Mono', monospace; }
  .display { font-family: 'Spectral', serif; }
  body { margin: 0; background: #F6F3EC; color: #2B2620; }
  .wrap { max-width: 560px; margin: 0 auto; padding: 24px 16px 64px; }

  /* month nav */
  .monthnav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .monthnav h1 { font-size: 20px; font-weight: 600; margin: 0; letter-spacing: -0.01em; }
  .monthnav .sub { font-size: 12px; color: #A39C8C; margin-top: 2px; }
  .navbtn { width: 36px; height: 36px; border: 1px solid #E5DFD0; background: #fff; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #6B6356; }
  .navbtn:hover { background: #F1ECE0; }
  .navbtn:disabled { opacity: .35; cursor: default; }

  /* summary */
  .summary { background: #2B2620; color: #F6F3EC; border-radius: 14px; padding: 18px; margin-bottom: 20px; }
  .sumrow { display: flex; justify-content: space-between; align-items: baseline; padding: 5px 0; font-size: 14px; }
  .sumrow .lbl { opacity: .8; }
  .sumrow .val { font-weight: 500; }
  .sum-income .val { color: #A7C9A2; }
  .sum-expense .val { color: #E8A398; }
  .sum-saving .val { color: #E3C58B; }
  .sumdivider { height: 1px; background: rgba(246,243,236,.15); margin: 8px 0; }
  .sum-balance { font-size: 16px; }
  .sum-balance .lbl { opacity: 1; font-weight: 600; }
  .sum-balance .val { font-weight: 700; font-size: 19px; }
  .sum-balance .val.neg { color: #E8A398; }

  /* sections */
  .section { margin-bottom: 18px; }
  .sechead { display: flex; align-items: center; gap: 7px; margin: 0 2px 8px; }
  .sechead .dot { width: 8px; height: 8px; border-radius: 50%; }
  .sechead h2 { font-size: 15px; font-weight: 600; margin: 0; }
  .sechead .count { margin-left: auto; font-size: 11px; color: #A39C8C; }
  .d-income { background: #5B7A5D; } .d-expense { background: #B0564A; } .d-saving { background: #C29B43; }

  .item { background: #fff; border: 1px solid #E5DFD0; border-radius: 10px; padding: 11px 13px; margin-bottom: 7px; display: flex; align-items: center; gap: 11px; }
  .chk { width: 22px; height: 22px; border-radius: 7px; border: 1.5px solid #D8D0BE; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; background: #fff; }
  .chk.on { background: #5B7A5D; border-color: #5B7A5D; }
  .chk.on.exp { background: #B0564A; border-color: #B0564A; }
  .chk svg { opacity: 0; }
  .chk.on svg { opacity: 1; }
  .iteminfo { flex: 1; min-width: 0; }
  .itemname { font-size: 14px; font-weight: 500; }
  .itemnote { font-size: 11px; color: #A39C8C; margin-top: 1px; }
  .badge { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 5px; margin-left: 6px; vertical-align: middle; font-weight: 500; }
  .badge.prepaid { background: #E7EBE2; color: #5B7A5D; }
  .badge.notyet { background: #F1ECE0; color: #A39C8C; }
  .badge.install { background: #F4E7E4; color: #B0564A; }
  .amtbox { display: flex; align-items: center; gap: 3px; }
  .amtbox .cur { font-size: 11px; color: #C7BFAE; }
  .amt { width: 92px; border: none; border-bottom: 1.5px solid #EDE7D9; background: transparent; text-align: right; font-size: 14px; padding: 3px 2px; outline: none; color: #2B2620; }
  .amt:focus { border-color: #8A6E4B; }
  .amt::placeholder { color: #D8D0BE; }
  .cname { width: 100%; border: none; border-bottom: 1px dashed #E5DFD0; background: transparent; font-size: 14px; font-weight: 500; padding: 3px 0; outline: none; color: #2B2620; }
  .cname:focus { border-color: #8A6E4B; }
  .item.custom { background: #FCFAF4; }
  .delrow { border: none; background: transparent; color: #C7BFAE; font-size: 20px; line-height: 1; cursor: pointer; padding: 0 2px; flex-shrink: 0; }
  .delrow:hover { color: #B0564A; }
  .addrow { width: 100%; border: 1px dashed #D8D0BE; background: #fff; color: #8A6E4B; border-radius: 10px; padding: 9px; font-size: 13px; font-weight: 500; cursor: pointer; margin-top: 2px; }
  .addrow:hover { background: #F4F1E8; }

  /* car loan */
  .tracker { background: #fff; border: 1px solid #E5DFD0; border-radius: 12px; padding: 14px 15px; margin-bottom: 18px; }
  .tracker .th { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 7px; margin-bottom: 10px; }
  .progress { height: 8px; background: #F1ECE0; border-radius: 99px; overflow: hidden; margin: 8px 0; }
  .progress > i { display: block; height: 100%; border-radius: 99px; }
  .pgrid { display: flex; gap: 14px; font-size: 12px; color: #6B6356; flex-wrap: wrap; }
  .pgrid b { color: #2B2620; font-weight: 600; }
  .installedit { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #6B6356; margin-top: 4px; }
  .installedit input { width: 48px; border: 1px solid #E5DFD0; border-radius: 6px; padding: 3px 6px; text-align: center; font-size: 13px; outline: none; }

  /* insurance */
  .ins { background: #fff; border: 1px solid #E5DFD0; border-radius: 10px; padding: 12px 13px; margin-bottom: 7px; transition: .15s; }
  .ins.due-red { border: 1.5px solid #B0564A; background: #FBF2F0; box-shadow: 0 0 0 1px rgba(176,86,74,.15); }
  .ins.due-amber { border: 1.5px solid #C29B43; background: #FCF7EC; }
  .insrow { display: flex; align-items: center; gap: 11px; }
  .insinfo { flex: 1; min-width: 0; }
  .insname { font-size: 14px; font-weight: 600; }
  .insmeta { font-size: 11px; color: #A39C8C; margin-top: 2px; }
  .insamt { font-size: 14px; font-weight: 600; }
  .insdue { font-size: 11px; margin-top: 2px; text-align: right; }
  .due-soon { color: #B0564A; font-weight: 600; }
  .due-ok { color: #A39C8C; }
  .due-paid { color: #5B7A5D; font-weight: 600; }

  /* cumulative */
  .cum { background: #EFEBDD; border: 1px solid #E5DFD0; border-radius: 12px; padding: 14px 15px; }
  .cumrow { display: flex; justify-content: space-between; font-size: 13px; padding: 4px 0; }
  .cumrow .v { font-weight: 600; }
  .cumtotal { border-top: 1px dashed #C7BFAE; margin-top: 6px; padding-top: 8px; font-size: 14px; font-weight: 700; }

  /* income overview */
  .incpanel { background: #fff; border: 1px solid #E5DFD0; border-radius: 12px; padding: 15px; }
  .inctabs { display: flex; gap: 6px; margin-bottom: 13px; }
  .inctab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 9px 4px; border: 1px solid #E5DFD0; border-radius: 9px; background: #fff; cursor: pointer; font-size: 11px; color: #8A8273; font-weight: 500; transition: .12s; }
  .inctab svg { width: 16px; height: 16px; }
  .inctab.on { background: #2B2620; color: #F6F3EC; border-color: #2B2620; }
  .incstats { display: flex; gap: 10px; margin-bottom: 14px; }
  .incstat { flex: 1; background: #F4F1E8; border-radius: 9px; padding: 9px 11px; }
  .incstat .l { font-size: 11px; color: #8A8273; }
  .incstat .v { font-size: 16px; font-weight: 700; margin-top: 2px; }
  .chart { display: flex; align-items: flex-end; gap: 4px; height: 110px; padding-top: 4px; }
  .bar { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; cursor: default; }
  .bar .fill { width: 100%; max-width: 22px; background: #5B7A5D; border-radius: 4px 4px 0 0; min-height: 2px; transition: height .25s; }
  .bar.cur .fill { background: #C29B43; }
  .bar.empty .fill { background: #ECE7DA; }
  .bar .ml { font-size: 10px; color: #A39C8C; margin-top: 5px; }
  .bar.cur .ml { color: #8A6322; font-weight: 600; }
  .incsrc { margin-top: 14px; border-top: 1px dashed #E5DFD0; padding-top: 10px; }
  .srcrow { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 0; }
  .srcrow .v { font-weight: 600; }

  .hint { font-size: 11px; color: #BBB3A2; text-align: center; margin-top: 20px; line-height: 1.6; }

  /* backup export/import */
  .backup { display: flex; gap: 8px; }
  .backupbtn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; background: #fff; border: 1px solid #E5DFD0; color: #6B6356; border-radius: 10px; padding: 10px; font-size: 12.5px; font-weight: 500; cursor: pointer; }
  .backupbtn:hover { background: #F4F1E8; }
  .backupbtn svg { width: 15px; height: 15px; flex-shrink: 0; }
  .backuphint { font-size: 11px; color: #A39C8C; text-align: center; margin-top: 8px; min-height: 14px; }
  .backuphint.ok { color: #5B7A5D; font-weight: 500; }
  .backuphint.err { color: #B0564A; font-weight: 500; }

  /* insurance alert banner */
  .insalert { border-radius: 12px; padding: 13px 15px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
  .insalert .ico { width: 34px; height: 34px; border-radius: 9px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .insalert .txt { flex: 1; min-width: 0; }
  .insalert .t1 { font-size: 13px; font-weight: 600; }
  .insalert .t2 { font-size: 12px; margin-top: 2px; opacity: .85; }
  .insalert .days { text-align: center; flex-shrink: 0; }
  .insalert .days b { display: block; font-size: 20px; font-weight: 700; line-height: 1; }
  .insalert .days span { font-size: 10px; opacity: .8; }
  .alert-red    { background: #F7E3DF; color: #8C3A2E; }
  .alert-red .ico    { background: #B0564A; color: #fff; }
  .alert-amber  { background: #F6EBD6; color: #8A6322; }
  .alert-amber .ico  { background: #C29B43; color: #fff; }
  .alert-green  { background: #E7EFE3; color: #41603F; }
  .alert-green .ico  { background: #5B7A5D; color: #fff; }

  /* bottom nav + pages */
  .wrap { padding-bottom: 88px; }
  .bottomnav { position: fixed; left: 0; right: 0; bottom: 0; background: rgba(246,243,236,.94); backdrop-filter: blur(8px); border-top: 1px solid #E5DFD0; display: flex; justify-content: center; gap: 8px; padding: 8px 12px calc(8px + env(safe-area-inset-bottom)); z-index: 50; }
  .navtab { flex: 1; max-width: 220px; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 7px 4px; border: none; background: transparent; border-radius: 11px; cursor: pointer; color: #A39C8C; font-size: 11px; font-weight: 500; }
  .navtab svg { width: 21px; height: 21px; }
  .navtab.on { color: #2B2620; background: #ECE6D8; }
</style>
</head>
<body>
<div class="wrap">

  <div class="monthnav">
    <button class="navbtn" id="prevM">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <div style="text-align:center">
      <h1 class="display" id="monthTitle">—</h1>
      <div class="sub" id="monthSub"></div>
    </div>
    <button class="navbtn" id="nextM">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </div>

  <!-- ============ หน้า: งบเดือน ============ -->
  <div id="pageMain" class="page">

    <div id="insAlert"></div>

    <div class="summary">
      <div class="sumrow sum-income"><span class="lbl">รายรับ</span><span class="val num" id="sIncome">0</span></div>
      <div class="sumrow sum-expense"><span class="lbl">รายจ่าย</span><span class="val num" id="sExpense">0</span></div>
      <div class="sumrow sum-saving"><span class="lbl">เงินออม</span><span class="val num" id="sSaving">0</span></div>
      <div class="sumdivider"></div>
      <div class="sumrow sum-balance"><span class="lbl">คงเหลือ</span><span class="val num" id="sBalance">0</span></div>
    </div>

    <div class="section">
      <div class="sechead"><span class="dot d-income"></span><h2>รายรับ</h2></div>
      <div id="incomeList"></div>
    </div>

    <div class="section">
      <div class="sechead"><span class="dot d-expense"></span><h2>รายจ่าย</h2><span class="count" id="expCount"></span></div>
      <div id="expenseList"></div>
    </div>

    <div class="tracker" id="carLoan"></div>

    <div class="section">
      <div class="sechead"><span class="dot d-saving"></span><h2>เงินออม / ลงทุน</h2><span class="count" id="savCount"></span></div>
      <div id="savingList"></div>
    </div>

    <div class="section">
      <div class="sechead"><span class="dot" style="background:#7A6A8A"></span><h2>เช็คลิสต์ประกัน (รายปี)</h2></div>
      <div id="insList"></div>
    </div>

    <div class="section">
      <div class="sechead"><span class="dot" style="background:#8A6E4B"></span><h2>ยอดออมสะสม (ทุกเดือนรวมกัน)</h2></div>
      <div class="cum" id="cumList"></div>
    </div>

    <div class="section">
      <div class="sechead"><span class="dot" style="background:#6B6356"></span><h2>สำรองข้อมูล</h2></div>
      <div class="backup">
        <button class="backupbtn" id="exportBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v3a1 1 0 001 1h14a1 1 0 001-1v-3"/></svg>
          ดาวน์โหลดไฟล์สำรอง
        </button>
        <button class="backupbtn" id="importBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15V3m0 0L8 7m4-4l4 4M4 17v3a1 1 0 001 1h14a1 1 0 001-1v-3"/></svg>
          นำเข้าไฟล์สำรอง
        </button>
        <input type="file" id="importFile" accept="application/json" style="display:none">
      </div>
      <div class="backuphint" id="backupHint"></div>
    </div>

    <div class="hint">ข้อมูลถูกบันทึกอัตโนมัติ • แต่ละเดือนแก้ตัวเลข/ติ๊กได้เลย ตรงไหนไม่มีเว้นว่างไว้</div>
  </div>

  <!-- ============ หน้า: รายรับ ============ -->
  <div id="pageIncome" class="page" style="display:none">
    <div class="section">
      <div class="sechead"><span class="dot d-income"></span><h2>ภาพรวมรายรับ</h2><span class="count" id="incYear"></span></div>
      <div class="incpanel" id="incPanel"></div>
    </div>
    <div class="section">
      <div class="sechead"><span class="dot d-income"></span><h2>รายเดือน</h2></div>
      <div class="cum" id="incBreakdown"></div>
    </div>
  </div>

</div>

<nav class="bottomnav">
  <button class="navtab on" data-page="main">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9.5L12 3l9 6.5V21H3z"/><path d="M9 21v-6h6v6"/></svg>
    <span>งบเดือน</span>
  </button>
  <button class="navtab" data-page="income">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 17l5-5 4 4 8-8M21 8v5h-5"/></svg>
    <span>รายรับ</span>
  </button>
</nav>

<script>
"use strict";

/* ---------- config: รายการประจำ ---------- */
const INCOME_ITEMS = ["เงิน df", "เงินเดือน", "เงินพิเศษ"];

const EXPENSE_ITEMS = [
  { name: "ผ่อนรถ", def: 29284, carLoan: true },
  { name: "ค่าโทรศัพท์", def: 640.93 },
  { name: "ค่าที่จอดรถคอนโด", def: 300, prepaidFrom: "2026-06", prepaidUntil: "2026-12", nextDue: "จ่ายรอบถัดไป 1 ม.ค. 70" },
  { name: "บัตรเครดิต Kbank", def: null },
  { name: "บัตรเครดิต KTC", def: null },
  { name: "Shopee PayLater", def: null },
  { name: "เงินส่วนตัว SCB", def: 10000 },
  { name: "เงินป๊าแม่", def: 20000 },
  { name: "อื่นๆ", def: null },
];

const SAVING_ITEMS = [
  { name: "เงินแต่งงาน BL", def: 20000, goal: 250000, note: "เป้า 250,000 ใน 6 เดือน" },
  { name: "เงิน fix cost", def: 20000, note: "ประกันชีวิต / ภาษี / ค่าส่วนกลาง" },
  { name: "เงินเย็น", def: null },
  { name: "WealthPlus DCA", def: 10000 },
  { name: "WealthPlus พีช", def: 15000 },
  { name: "Jitta DCA", def: 10000 },
  { name: "K World RMF (DCA)", def: 5000 },
  { name: "K2040 RMF (DCA)", def: 5000 },
  { name: "SCB S&P500E (DCA)", def: 10000, startMonth: "2026-07", note: "เริ่ม ก.ค. 69" },
];

const INSURANCE_DEF = [
  { id: "aia_plus", name: "AIA Plus",        amount: 250000, due: "2027-04-16", cur: 3, total: 4  },
  { id: "axa",      name: "AXA",             amount: 100000, due: "2026-09-01", cur: 4, total: 12 },
  { id: "aia_ci",   name: "AIA โรคร้ายแรง",  amount: 33890,  due: "2026-12-02", cur: 3, total: 20 },
];

const TH_MONTHS = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
const START_KEY = "2026-01";

/* ---------- state ---------- */
const hasClaudeStorage = typeof window !== "undefined" && window.storage && typeof window.storage.get === "function";
const hasLocalStorage = (() => { try { localStorage.setItem("__t","1"); localStorage.removeItem("__t"); return true; } catch (e) { return false; } })();
const STORAGE_KEY = "budget_v1";
let data = { months: {}, carInstallment: 14, insPaid: {} };
let curKey = monthKeyNow();

/* ---------- helpers ---------- */
function monthKeyNow() {
  const d = new Date();
  const k = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0");
  return k < START_KEY ? START_KEY : k;
}
function keyToParts(k) { const [y, m] = k.split("-").map(Number); return { y, m }; }
function thaiMonth(k) { const { y, m } = keyToParts(k); return TH_MONTHS[m - 1] + " " + (y + 543); }
function shiftKey(k, delta) {
  let { y, m } = keyToParts(k); m += delta;
  while (m > 12) { m -= 12; y++; } while (m < 1) { m += 12; y--; }
  return y + "-" + String(m).padStart(2, "0");
}
function fmt(n) { return new Intl.NumberFormat("th-TH", { maximumFractionDigits: 2 }).format(n || 0); }
function esc(s){ const d=document.createElement("div"); d.textContent=s; return d.innerHTML; }

function defaultMonth(key) {
  const m = { income: {}, expenses: {}, savings: {} };
  INCOME_ITEMS.forEach(n => { m.income[n] = null; });
  EXPENSE_ITEMS.forEach(it => {
    let amt = it.def;
    if (it.prepaidFrom && it.prepaidUntil && key >= it.prepaidFrom && key <= it.prepaidUntil) amt = 0; // จ่ายล่วงหน้าแล้ว
    m.expenses[it.name] = { amt, done: false };
  });
  SAVING_ITEMS.forEach(it => {
    let amt = it.def;
    if (it.startMonth && key < it.startMonth) amt = 0; // ยังไม่เริ่ม
    m.savings[it.name] = { amt, done: false };
  });
  return m;
}
function getMonth(key) {
  if (!data.months[key]) data.months[key] = defaultMonth(key);
  const m = data.months[key];
  const def = defaultMonth(key);
  if (!m.income) m.income = {};
  if (!m.expenses) m.expenses = {};
  if (!m.savings) m.savings = {};
  if (!m.expCustom) m.expCustom = [];
  if (!m.incCustom) m.incCustom = [];
  INCOME_ITEMS.forEach(n => { if (!(n in m.income)) m.income[n] = def.income[n]; });
  EXPENSE_ITEMS.forEach(it => { if (!m.expenses[it.name]) m.expenses[it.name] = def.expenses[it.name]; });
  SAVING_ITEMS.forEach(it => { if (!m.savings[it.name]) m.savings[it.name] = def.savings[it.name]; });
  return m;
}

/* ---------- storage ---------- */
async function load() {
  if (hasClaudeStorage) {
    try { const r = await window.storage.get(STORAGE_KEY); if (r && r.value) data = JSON.parse(r.value); }
    catch (e) {}
  } else if (hasLocalStorage) {
    try { const raw = localStorage.getItem(STORAGE_KEY); if (raw) data = JSON.parse(raw); }
    catch (e) {}
  }
  if (!data.months) data.months = {};

  (spec.sav || []).forEach(([name, amt]) => { sav[name] = { amt, done: true }; });

    income: inc, expenses: exp, savings: sav,
    expCustom: (spec.custom || []).map((c, i) => ({ id: key + "-c" + i, name: c[0], amt: c[1], done: true })),

}

/* ---------- summary ---------- */
function calcMonth(key) {
  const m = getMonth(key);
  let inc = 0, exp = 0, sav = 0, expDone = 0, expTotal = 0, savDone = 0, savTotal = 0;
  Object.values(m.income).forEach(v => inc += (+v || 0));
  (m.incCustom || []).forEach(c => { inc += (+c.amt || 0); });
  EXPENSE_ITEMS.forEach(it => { const c = m.expenses[it.name]; if (c) { exp += (+c.amt || 0); expTotal++; if (c.done) expDone++; } });
  (m.expCustom || []).forEach(c => { exp += (+c.amt || 0); expTotal++; if (c.done) expDone++; });
  SAVING_ITEMS.forEach(it => { const c = m.savings[it.name]; if (c) { sav += (+c.amt || 0); savTotal++; if (c.done) savDone++; } });
  return { inc, exp, sav, bal: inc - exp - sav, expDone, expTotal, savDone, savTotal };
}

  const pa = keyToParts(a), pb = keyToParts(b);
  return (pb.y - pa.y) * 12 + (pb.m - pa.m);
}

  return Math.max(0, Math.min(total, n));

    '<span>เหลือ <b>' + remain + ' งวด</b></span>' +
    '<span>ยอดคงเหลือ <b class="num">' + fmt(remain * per) + ' ฿</b></span></div>' +
    '<div class="installedit">เดือนนี้ (' + thaiMonth(monthKeyNow()) + ') งวดที่ <input id="carInput" class="num" inputmode="numeric" value="' + baseNow + '"> / ' + total + ' — เดือนอื่นระบบนับให้อัตโนมัติ</div>';
  const inp = document.getElementById("carInput");
  inp.addEventListener("change", () => {
    let v = parseInt(inp.value, 10); if (isNaN(v)) v = 0; v = Math.max(0, Math.min(total, v));
    data.carInstallment = v; save(); renderCar(); renderExpenses();
  });
}

/* ---------- insurance (auto-advance งวด ตามปี) ---------- */
function daysUntil(due) {
  const d = new Date(due + "T00:00:00");
  return Math.ceil((d - new Date()) / 86400000);
}
function thaiDate(due) {
  const [y, m, d] = due.split("-").map(Number);
  return d + " " + TH_MONTHS[m - 1] + " " + (y + 543);
}
// คืนงวด/วันครบกำหนดถัดไปที่ "ยังไม่จ่าย" — ข้ามปีที่จ่ายแล้วให้อัตโนมัติ
function nextInsDue(it) {
  const [by, m, d] = it.due.split("-").map(Number);
  const paidMap = data.insPaid[it.id] || {};
  let year = by;
  while (paidMap[year] && (it.cur + (year - by)) < it.total) year++;
  const dueStr = year + "-" + String(m).padStart(2, "0") + "-" + String(d).padStart(2, "0");
  const installment = Math.min(it.total, it.cur + (year - by));
  const done = installment >= it.total && paidMap[year];
  return { year, dueStr, installment, paid: !!paidMap[year], done };
}
function renderInsurance() {
  const host = document.getElementById("insList");
  host.innerHTML = "";
  INSURANCE_DEF.forEach(it => {
    const nd = nextInsDue(it);
    const days = daysUntil(nd.dueStr);
    let dueCls = "due-ok", dueTxt, cardCls = "ins";
    if (nd.paid) { dueCls = "due-paid"; dueTxt = "จ่ายงวดนี้แล้ว ✓"; }
    else if (days < 0) { dueCls = "due-soon"; dueTxt = "เลยกำหนด " + Math.abs(days) + " วัน"; cardCls = "ins due-red"; }
    else if (days <= 30) { dueCls = "due-soon"; dueTxt = "อีก " + days + " วัน"; cardCls = "ins due-red"; }
    else if (days <= 45) { dueCls = "due-soon"; dueTxt = "อีก " + days + " วัน"; cardCls = "ins due-amber"; }
    else { dueTxt = "อีก " + days + " วัน"; }
    const card = document.createElement("div");
    card.className = cardCls;
    card.innerHTML =
      '<div class="insrow">' +
      '<div class="chk' + (nd.paid ? " on" : "") + '">' + checkSvg() + '</div>' +
      '<div class="insinfo"><div class="insname">' + esc(it.name) + '</div>' +
      '<div class="insmeta">ครบกำหนด ' + thaiDate(nd.dueStr) + ' • งวด ' + nd.installment + '/' + it.total + '</div></div>' +
      '<div style="text-align:right"><div class="insamt num">' + fmt(it.amount) + ' ฿</div>' +
      '<div class="insdue ' + dueCls + '">' + dueTxt + '</div></div></div>';
    const chk = card.querySelector(".chk");
    chk.addEventListener("click", () => {
      if (!data.insPaid[it.id]) data.insPaid[it.id] = {};
      data.insPaid[it.id][nd.year] = !data.insPaid[it.id][nd.year];
      save(); renderInsurance(); renderInsAlert();
    });
    host.appendChild(card);
  });
}

/* ---------- insurance alert banner ---------- */
function renderInsAlert() {
  const host = document.getElementById("insAlert");
  let next = null;
  INSURANCE_DEF.forEach(it => {
    const nd = nextInsDue(it);
    if (nd.paid) return;
    const days = daysUntil(nd.dueStr);
    if (next === null || days < next.days) next = { it, nd, days };
  });
  if (!next) { host.innerHTML = ""; return; }

  const { it, nd, days } = next;
  if (days > 90) { host.innerHTML = ""; return; }

  let cls, t1, daysTxt, daysLbl;
  if (days < 0) { cls = "alert-red"; t1 = "เลยกำหนดจ่ายประกันแล้ว!"; daysTxt = Math.abs(days); daysLbl = "วันที่เลยมา"; }
  else if (days <= 30) { cls = "alert-red"; t1 = "ใกล้ถึงวันจ่ายประกันแล้ว"; daysTxt = days; daysLbl = "วันที่เหลือ"; }
  else if (days <= 60) { cls = "alert-amber"; t1 = "เตรียมตัวจ่ายประกัน"; daysTxt = days; daysLbl = "วันที่เหลือ"; }
  else { cls = "alert-green"; t1 = "มีประกันรอจ่ายเร็วๆ นี้"; daysTxt = days; daysLbl = "วันที่เหลือ"; }

  host.innerHTML =
    '<div class="insalert ' + cls + '">' +
    '<div class="ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>' +
    '<div class="txt"><div class="t1">' + t1 + '</div>' +
    '<div class="t2">' + esc(it.name) + ' • ' + fmt(it.amount) + ' ฿ • งวด ' + nd.installment + '/' + it.total + ' • ครบกำหนด ' + thaiDate(nd.dueStr) + '</div></div>' +
    '<div class="days"><b class="num">' + daysTxt + '</b><span>' + daysLbl + '</span></div></div>';
}

/* ---------- income overview (per year, with tabs) ---------- */
const INC_VIEWS = [
  { id: "all",   label: "รวมทั้งหมด", srcs: INCOME_ITEMS,      color: "#5B7A5D", includeCustom: true },
  { id: "df",    label: "df",         srcs: ["เงิน df"],        color: "#4F7BA6" },
  { id: "extra", label: "รายได้เสริม", srcs: ["เงินพิเศษ"],      color: "#C29B43" },
];
let incView = "all";

function incIcon(id) {
  if (id === "all")   return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l9 5 9-5M3 7l9 5 9-5-9-5-9 5M3 17l9 5 9-5"/></svg>';
  if (id === "df")    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 17l5-5 4 4 8-8M21 8v5h-5"/></svg>';
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg>';
}
function monthIncomeSrc(key, srcs, includeCustom) {
  const m = data.months[key];
  if (!m) return 0;
  let t = 0;
  if (m.income) srcs.forEach(n => t += (+m.income[n] || 0));
  if (includeCustom && m.incCustom) m.incCustom.forEach(c => t += (+c.amt || 0));
  return t;
}
function renderIncomeOverview() {
  const year = keyToParts(curKey).y;
  document.getElementById("incYear").textContent = "ปี " + (year + 543);
  const view = INC_VIEWS.find(v => v.id === incView) || INC_VIEWS[0];

  const monthly = [];
  for (let mo = 1; mo <= 12; mo++) {
    const k = year + "-" + String(mo).padStart(2, "0");
    monthly.push({ mo, k, total: monthIncomeSrc(k, view.srcs, view.includeCustom) });
  }
  const yearTotal = monthly.reduce((s, x) => s + x.total, 0);
  const earnedMonths = monthly.filter(x => x.total > 0).length;
  const avg = earnedMonths ? yearTotal / earnedMonths : 0;
  const max = Math.max(1, ...monthly.map(x => x.total));

  // tabs
  let tabs = "";
  INC_VIEWS.forEach(v => {
    tabs += '<button class="inctab' + (v.id === incView ? " on" : "") + '" data-v="' + v.id + '">' +
            incIcon(v.id) + '<span>' + v.label + '</span></button>';
  });

  // bars
  let bars = "";
  monthly.forEach(x => {
    const h = x.total > 0 ? Math.max(6, (x.total / max) * 100) : 4;
    const isCur = x.k === curKey;
    const color = x.total > 0 ? view.color : "#ECE7DA";
    const ml = isCur ? '<div class="ml" style="color:' + view.color + ';font-weight:600">' + TH_MONTHS[x.mo - 1].slice(0, 3) + '</div>'
                     : '<div class="ml">' + TH_MONTHS[x.mo - 1].slice(0, 3) + '</div>';
    bars += '<div class="bar" title="' + TH_MONTHS[x.mo - 1] + ' ' + fmt(x.total) + ' ฿">' +
            '<div class="fill" style="height:' + h + '%;background:' + color + (isCur ? ';outline:2px solid ' + view.color + ';outline-offset:1px' : '') + '"></div>' +
            ml + '</div>';
  });

  // breakdown of this view's sources
  let src = "";
  view.srcs.forEach(n => {
    let total = 0;
    monthly.forEach(x => { const m = data.months[x.k]; if (m && m.income) total += (+m.income[n] || 0); });
    if (total > 0) src += '<div class="srcrow"><span>' + esc(n) + '</span><span class="v num">' + fmt(total) + ' ฿</span></div>';
  });
  if (view.includeCustom) {
    const customTotals = {};
    monthly.forEach(x => {
      const m = data.months[x.k];
      if (m && m.incCustom) m.incCustom.forEach(c => {
        if (!c.name) return;
        customTotals[c.name] = (customTotals[c.name] || 0) + (+c.amt || 0);
      });
    });
    Object.keys(customTotals).forEach(n => {
      if (customTotals[n] > 0) src += '<div class="srcrow"><span>' + esc(n) + '</span><span class="v num">' + fmt(customTotals[n]) + ' ฿</span></div>';
    });
  }
  if (!src) src = '<div class="srcrow" style="color:#A39C8C">ยังไม่มีข้อมูลในมุมมองนี้</div>';

  document.getElementById("incPanel").innerHTML =
    '<div class="inctabs">' + tabs + '</div>' +
    '<div class="incstats">' +
      '<div class="incstat"><div class="l">รวมทั้งปี</div><div class="v num">' + fmt(yearTotal) + '</div></div>' +
      '<div class="incstat"><div class="l">เฉลี่ย/เดือน</div><div class="v num">' + fmt(Math.round(avg)) + '</div></div>' +
    '</div>' +
    '<div class="chart">' + bars + '</div>' +
    '<div class="incsrc">' + src + '</div>';

  document.querySelectorAll("#incPanel .inctab").forEach(btn => {
    btn.addEventListener("click", () => { incView = btn.dataset.v; renderIncomeOverview(); });
  });

  // รายเดือน (เฉพาะเดือนที่มียอด)
  let bd = "";
  monthly.forEach(x => {
    if (x.total > 0)
      bd += '<div class="cumrow"><span>' + TH_MONTHS[x.mo - 1] + '</span><span class="v num">' + fmt(x.total) + ' ฿</span></div>';
  });
  if (!bd) bd = '<div class="cumrow" style="color:#A39C8C">ยังไม่มีรายรับในปีนี้</div>';
  bd += '<div class="cumrow cumtotal"><span>รวมทั้งปี</span><span class="v num">' + fmt(yearTotal) + ' ฿</span></div>';
  document.getElementById("incBreakdown").innerHTML = bd;
}

/* ---------- cumulative savings (done only) ---------- */
function renderCumulative() {
  const totals = {}; SAVING_ITEMS.forEach(it => totals[it.name] = 0);
  let grand = 0;
  Object.values(data.months).forEach(m => {
    if (!m.savings) return;
    SAVING_ITEMS.forEach(it => {
      const c = m.savings[it.name];
      if (c && c.done) { totals[it.name] += (+c.amt || 0); grand += (+c.amt || 0); }
    });
  });
  const host = document.getElementById("cumList");
  let html = "";
  SAVING_ITEMS.forEach(it => {
    if (totals[it.name] > 0) {
      let goalTxt = "";
      if (it.goal) {
        const pct = Math.min(100, Math.round(totals[it.name] / it.goal * 100));
        goalTxt = '<div style="font-size:11px;color:#8A8273;margin-top:2px">เป้า ' + fmt(it.goal) + ' • ' + pct + '%' +
          '<div class="progress" style="margin:4px 0 0"><i style="width:' + pct + '%;background:#C29B43"></i></div></div>';
      }
      html += '<div class="cumrow" style="display:block"><div style="display:flex;justify-content:space-between"><span>' + esc(it.name) + '</span><span class="v num">' + fmt(totals[it.name]) + ' ฿</span></div>' + goalTxt + '</div>';
    }
  });
  if (!html) html = '<div class="cumrow" style="color:#A39C8C">ติ๊ก "ออมแล้ว" ในแต่ละเดือน แล้วยอดสะสมจะมาโชว์ตรงนี้</div>';
  html += '<div class="cumrow cumtotal"><span>รวมทั้งหมด</span><span class="v num">' + fmt(grand) + ' ฿</span></div>';
  host.innerHTML = html;
}

/* ---------- month switch ---------- */
function renderAll() {
  document.getElementById("monthTitle").textContent = thaiMonth(curKey);
  document.getElementById("monthSub").textContent = curKey === monthKeyNow() ? "เดือนนี้" : "";
  document.getElementById("prevM").disabled = (curKey <= START_KEY);
  renderIncome(); renderExpenses(); renderSavings(); renderInsurance(); renderInsAlert();
  updateSummary();
}

document.getElementById("prevM").addEventListener("click", () => {
  if (curKey <= START_KEY) return;
  curKey = shiftKey(curKey, -1); renderAll();
});
document.getElementById("nextM").addEventListener("click", () => {
  curKey = shiftKey(curKey, 1); renderAll();
});

/* ---------- backup: export / import ---------- */
function backupHint(msg, cls) {
  const el = document.getElementById("backupHint");
  el.textContent = msg;
  el.className = "backuphint" + (cls ? " " + cls : "");
}
document.getElementById("exportBtn").addEventListener("click", () => {
  try {
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const today = new Date().toISOString().slice(0, 10);
    a.href = url;
    a.download = "budget-backup-" + today + ".json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    backupHint("ดาวน์โหลดไฟล์สำรองแล้ว ✓", "ok");
  } catch (e) {
    backupHint("ดาวน์โหลดไม่สำเร็จ ลองใหม่อีกครั้ง", "err");
  }
});
document.getElementById("importBtn").addEventListener("click", () => {
  document.getElementById("importFile").click();
});
document.getElementById("importFile").addEventListener("change", (e) => {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(reader.result);
      if (!parsed || typeof parsed !== "object" || !parsed.months) throw new Error("invalid");
      data = parsed;
      save();
      renderAll();
      backupHint("นำเข้าข้อมูลสำเร็จ ✓", "ok");
    } catch (err) {
      backupHint("ไฟล์ไม่ถูกต้อง กรุณาเลือกไฟล์สำรองที่ดาวน์โหลดจากระบบนี้", "err");
    }
  };
  reader.onerror = () => backupHint("อ่านไฟล์ไม่สำเร็จ", "err");
  reader.readAsText(file);
  e.target.value = "";
});

/* ---------- page switch ---------- */
document.querySelectorAll(".navtab").forEach(btn => {
  btn.addEventListener("click", () => {
    const page = btn.dataset.page;
    document.querySelectorAll(".navtab").forEach(b => b.classList.toggle("on", b === btn));
    document.getElementById("pageMain").style.display = (page === "main") ? "" : "none";
    document.getElementById("pageIncome").style.display = (page === "income") ? "" : "none";
    window.scrollTo(0, 0);
  });
});

/* ---------- init ---------- */
(async function () {
  try { await load(); } catch (e) {}
  try { renderAll(); } catch (e) { console.error(e); }
})();
</script>
